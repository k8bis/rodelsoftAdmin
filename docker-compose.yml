volumes:
  mysql_data: {}

services:
  mysql:
    image: mysql:8.0
    container_name: proyecto_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-proyecto_db}
      MYSQL_USER: ${MYSQL_USER:-proyecto_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/00-init.sql:/docker-entrypoint-initdb.d/00-init.sql
      - ./database/10-schema.sql:/docker-entrypoint-initdb.d/10-schema.sql
      - ./database/20-seed.sql:/docker-entrypoint-initdb.d/20-seed.sql
      - ./database/30-pos-schema.sql:/docker-entrypoint-initdb.d/30-pos-schema.sql
      - ./database/40-pos-seed.sql:/docker-entrypoint-initdb.d/40-pos-seed.sql
      - ./database/50-migrate_fase6_subscriptions.sql:/docker-entrypoint-initdb.d/50-migrate_fase6_subscriptions.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  launch-service:
    build: ./launch-service
    container_name: launch_service
    restart: always
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-proyecto_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-proyecto_db}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      DB_MAX_RETRIES: 30
      DB_RETRY_DELAY: 2
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8200:8200"

  app-hija-1:
    build: ./apps/app-hija-1
    container_name: proyecto_app1
    restart: always
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-proyecto_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-proyecto_db}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      DB_MAX_RETRIES: 30
      DB_RETRY_DELAY: 2
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:8000"

  app-hija-2:
    build: ./apps/app-hija-2
    container_name: proyecto_app2
    restart: always
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-proyecto_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-proyecto_db}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3002:3002"

  rodelsoft-pos:
    build: ./apps/rodelsoft-pos
    container_name: rodelsoft-pos
    restart: always
    environment:
      POS_MYSQL_HOST: mysql
      POS_MYSQL_PORT: 3306
      POS_MYSQL_USER: ${MYSQL_USER:-proyecto_user}
      POS_MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      POS_MYSQL_DATABASE: ${POS_MYSQL_DATABASE:-pos_db}
      CONTROL_PLANE_BASE_URL: ${CONTROL_PLANE_BASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      DB_MAX_RETRIES: 30
      DB_RETRY_DELAY: 2
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${POS_PORT:-8001}:8000"

  authz-service:
    build: ./authz-service
    container_name: authz_service
    restart: always
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-proyecto_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-proyecto_db}
      AUTHZ_ADMIN_KEY: ${AUTHZ_ADMIN_KEY}
      AUTHZ_ENABLE_DOCS: ${AUTHZ_ENABLE_DOCS:-false}
      DB_MAX_RETRIES: 30
      DB_RETRY_DELAY: 2
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8400:8100"

  dynamic-app-router:
    build: ./dynamic-app-router
    container_name: dynamic_app_router
    restart: always
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-proyecto_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-proyecto_db}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      DB_MAX_RETRIES: 30
      DB_RETRY_DELAY: 2
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8300:8300"

  portal:
    build: ./portal
    container_name: portal
    restart: always
    depends_on:
      - app-hija-1
      - launch-service
      - dynamic-app-router
    ports:
      - "3000:80"

  nginx:
    build: ./nginx
    container_name: proyecto_nginx
    restart: always
    depends_on:
      - portal
      - app-hija-1
      - app-hija-2
      - rodelsoft-pos
      - launch-service
      - authz-service
      - dynamic-app-router
    ports:
      - "${NGINX_PORT:-8080}:8080"