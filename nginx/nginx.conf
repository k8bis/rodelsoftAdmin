events {}

http {
  server {
    listen 8080;

    # ==========================================================
    # Portal (frontend / login UI)
    # ==========================================================
    location / {
      proxy_pass http://portal:80/;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================================
    # Launch Service (router dinámico por BD)
    # - valida JWT
    # - valida permisos
    # - consulta applications en BD
    # - health check por internal_url + health_path
    # - redirige a public_url + entry_path
    # ==========================================================
    location /launch {
      proxy_pass http://launch-service:8200/launch;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Pasar cookies reales del navegador
      proxy_set_header Cookie $http_cookie;
    }

    # ==========================================================
    # Launch auxiliary endpoints
    # ==========================================================
    location /app-unavailable {
      proxy_pass http://launch-service:8200/app-unavailable;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Cookie $http_cookie;
    }

    location /launch-health {
      proxy_pass http://launch-service:8200/health;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================================
    # App1 auth endpoints (portal depende actualmente de App1)
    # ==========================================================
    location = /app1/login {
      proxy_pass http://app-hija-1:8000/login;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Cookie $http_cookie;
    }

    location = /app1/logout {
      proxy_pass http://app-hija-1:8000/logout;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Authorization "Bearer $cookie_jwt";
      proxy_set_header Cookie $http_cookie;
    }

    location = /app1/validate {
      proxy_pass http://app-hija-1:8000/validate;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Authorization "Bearer $cookie_jwt";
      proxy_set_header Cookie $http_cookie;
    }

    location = /app1/my/apps {
      proxy_pass http://app-hija-1:8000/my/apps;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Authorization "Bearer $cookie_jwt";
      proxy_set_header Cookie $http_cookie;
    }

    # ==========================================================
    # App1 local (gateway path)
    # Usado cuando applications.public_url = '/app1/'
    # ==========================================================
    location /app1/ {
      proxy_pass http://app-hija-1:8000/;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Seguridad / contexto
      proxy_set_header Authorization "Bearer $cookie_jwt";
      proxy_set_header Cookie $http_cookie;
      proxy_set_header X-App-Id $arg_app_id;
      proxy_set_header X-Client-Id $arg_client_id;
    }

    # ==========================================================
    # App2 local (gateway path)
    # Usado cuando applications.public_url = '/app2/'
    # ==========================================================
    location /app2/ {
      proxy_pass http://app-hija-2:3002/;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Seguridad / contexto
      proxy_set_header Authorization "Bearer $cookie_jwt";
      proxy_set_header Cookie $http_cookie;
      proxy_set_header X-App-Id $arg_app_id;
      proxy_set_header X-Client-Id $arg_client_id;
    }

    # ==========================================================
    # POS local (gateway path)
    # Usado cuando applications.public_url = '/pos/'
    # ==========================================================
    location /pos/ {
      proxy_pass http://rodelsoft-pos:8000/;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Seguridad / contexto
      proxy_set_header Authorization "Bearer $cookie_jwt";
      proxy_set_header Cookie $http_cookie;
      proxy_set_header X-App-Id $arg_app_id;
      proxy_set_header X-Client-Id $arg_client_id;
    }

    # ==========================================================
    # AuthZ service (opcional / admin-only)
    # ==========================================================
    location /authz/ {
      proxy_pass http://authz-service:8100/;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Authorization "Bearer $cookie_jwt";
      proxy_set_header Cookie $http_cookie;
    }
  }
}