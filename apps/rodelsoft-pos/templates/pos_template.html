<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RodelSoft POS - __APP_NAME__</title>
  <link rel="stylesheet" href="./static/pos.css" />
</head>
<body>
  <div class="pos-layout">

    <!-- HEADER -->
    <header class="pos-header">
      <div class="brand-block">
        <div class="brand-title">🛒 RodelSoft</div>
      </div>
      <div>
        <div class="brand-subtitle">__CLIENT_NAME__</div>
        <div class="brand-app">__APP_NAME__</div>
      </div>
      <div class="user-block">
        <button id="userMenuBtn" class="user-btn">👤 __USER__</button>
        <div id="userDropdown" class="user-dropdown">
          <button id="appsMenuBtn" type="button">Volver a apps</button>
          <button id="logoutBtn" type="button">Cerrar sesión</button>
        </div>
      </div>
    </header>

    <!-- MAIN -->
    <main class="pos-main">

      <!-- PANEL IZQUIERDO -->
      <section class="catalog-panel">
        <div class="section-title">Catálogo de Productos</div>

        <div class="toolbar">
          <button id="refreshBtn" class="action-btn">🔄 Refrescar</button>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Buscar productos..."
          />
        </div>

        <div id="categoriesContainer" class="categories-container"></div>

        <div id="productsGrid" class="products-grid">
          <div class="loading-box">Cargando catálogo...</div>
        </div>
      </section>

      <!-- PANEL DERECHO -->
      <aside class="cart-panel">
        <div class="section-title">Carrito de Compras</div>

        <div id="cartItems" class="cart-items">
          <div class="empty-cart">El carrito está vacío.</div>
        </div>

        <div id="cartTotal" class="cart-total">Total: $0.00</div>

        <button id="checkoutBtn" class="checkout-btn">💳 Procesar Pago</button>
      </aside>

    </main>
  </div>

  <script>
    window.POS_CONFIG = {
      VERSION: "POS_TEMPLATE_V3_CATALOGO_OK",
      APP_BASE_PATH: "__APP_BASE_PATH__",
      APP_MENU_URL: "__APP_MENU_URL__",
      LOGOUT_REDIRECT_URL: "__LOGOUT_REDIRECT_URL__"
    };
    console.log("POS_CONFIG =>", window.POS_CONFIG);
  </script>

  <script src="./static/pos.js?v=20260326-4"></script>
</body>
</html>
